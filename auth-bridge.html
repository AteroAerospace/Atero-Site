<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="robots"
    content="noindex, nofollow"
  >

  <title>Verificando sessão — Atero</title>

  <style>
    :root {
      color-scheme: light;
      font-family:
        Inter,
        Arial,
        sans-serif;
      background: #f5f5f3;
      color: #171717;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 520px);
      text-align: center;
    }

    .marca {
      width: 44px;
      height: 4px;
      margin: 0 auto 28px;
      border-radius: 999px;
      background: #f4c400;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 5vw, 2.6rem);
      letter-spacing: -0.04em;
    }

    p {
      margin: 14px 0 0;
      color: #5a5a5a;
      line-height: 1.6;
    }

    button {
      margin-top: 26px;
      padding: 12px 18px;
      border: 0;
      border-radius: 10px;
      background: #171717;
      color: #ffffff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button[hidden] {
      display: none;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <main>
    <div
      class="marca"
      aria-hidden="true"
    ></div>

    <h1>Verificando sua conta</h1>

    <p
      id="status-sessao"
      role="status"
      aria-live="polite"
    >
      Restaurando sua sessão Atero...
    </p>

    <button
      id="tentar-novamente"
      type="button"
      hidden
    >
      Tentar novamente
    </button>
  </main>

  <script
    type="module"
    src="js/auth-bridge.js?v=18"
  ></script>
</body>
</html>
